<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKELETON TRACKER</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>

<body>

<div id="header">

<div id="title">
SKELETON TRACKER
</div>

<div id="status-row">

<div class="status-badge">
<div class="dot" id="dot-cam"></div>
CAMERA
</div>

<div class="status-badge">
<div class="dot" id="dot-model"></div>
MODEL
</div>

</div>
</div>

<div id="canvas-wrapper">
<canvas id="output"></canvas>
</div>

<button id="toggleCam">SHOW CAM</button>
<button id="pipBtn">POP OUT</button>
<button id="cameraBtn">CAMERA</button>
<button id="obsBtn">OBS LINK</button>

<video
id="video"
playsinline
webkit-playsinline
autoplay
muted>
</video>

<script type="module" src="app.js"></script>

</body>
</html>
