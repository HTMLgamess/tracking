<!DOCTYPE html>  
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKELETON TRACKER</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

*{
box-sizing:border-box;
margin:0;
padding:0;
background:transparent;
}

:root{
--cyan:#00f5ff;
--magenta:#ff00aa;
}

html,
body{
width:100%;
height:100%;
background:#000 !important;
color:var(--cyan);
font-family:'Share Tech Mono',monospace;
overflow:hidden;
}

#canvas-wrapper{
position:fixed;
inset:0;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000 !important;
z-index:1;
}

canvas{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:contain;
background:#000 !important;
}

video{
display:none;
}

#header{
position:fixed;
top:0;
left:0;
right:0;
display:flex;
justify-content:space-between;
padding:14px 28px;
background:rgba(10,10,20,.8);
z-index:50;
}

#title{
font-family:'Orbitron',sans-serif;
font-weight:900;
letter-spacing:.3em;
}

#status-row{
display:flex;
gap:18px;
font-size:.7rem;
}

.status-badge{
display:flex;
align-items:center;
gap:6px;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
background:#333;
}

.dot.active{
background:var(--cyan);
}

button{
padding:8px 12px;
border:none;
background:var(--cyan);
cursor:pointer;
font-family:'Orbitron';
}

#pipBtn{
position:fixed;
bottom:20px;
left:140px;
z-index:100;
}

#cameraBtn{
position:fixed;
bottom:20px;
left:250px;
z-index:100;
}

#obsBtn{
position:fixed;
bottom:20px;
left:380px;
z-index:100;
}
</style>
</head>

<body>

<div id="header">

<div id="title">
SKELETON TRACKER
</div>

<div id="status-row">

<div class="status-badge">
<div class="dot" id="dot-cam"></div>
CAMERA
</div>

<div class="status-badge">
<div class="dot" id="dot-model"></div>
MODEL
</div>

</div>
</div>

<div id="canvas-wrapper">
<canvas id="output"></canvas>
</div>

<button id="toggleCam"
style="position:fixed;bottom:20px;left:20px;z-index:100">
SHOW CAM
</button>

<button id="pipBtn">POP OUT</button>
<button id="cameraBtn">CAMERA</button>
<button id="obsBtn">OBS LINK</button>

<video
id="video"
playsinline
webkit-playsinline
autoplay
muted>
</video>

<script>

const video=
document.getElementById('video');

const canvas=
document.getElementById('output');

const ctx=
canvas.getContext(
'2d',
{
alpha:false
}
);

let latestResults=null;
let showCamera=false;
let currentDeviceId=null;
let outputStream;
let previousPose=[];
let holistic;
let cameraInstance;

const isMobile=
/Android|iPhone|iPad|iPod/i
.test(
navigator.userAgent
);


function smoothPoint(
newPt,
oldPt
){

if(!oldPt)
return newPt;

return{

x:
oldPt.x*0.35+
newPt.x*0.65,

y:
oldPt.y*0.35+
newPt.y*0.65
};
}


async function startCamera(){

if(
video.srcObject
){

video.srcObject
.getTracks()
.forEach(
t=>t.stop()
);
}

const stream=
await navigator
.mediaDevices
.getUserMedia({

audio:false,

video:{

deviceId:
currentDeviceId
? {exact:currentDeviceId}
: undefined,

facingMode:
isMobile
? "user"
: undefined
}
});

video.srcObject=
stream;

await video.play();

canvas.width=
video.videoWidth;

canvas.height=
video.videoHeight;

canvas.style.aspectRatio=
`${video.videoWidth}/${video.videoHeight}`;

previousPose=[];

document
.getElementById(
'dot-cam'
)
.classList.add(
'active'
);

if(
cameraInstance
){
cameraInstance.stop();
}

cameraInstance=
new Camera(
video,
{

onFrame:
async()=>{

if(
holistic
){

await holistic.send({
image:video
});
}
},

width:
canvas.width,

height:
canvas.height
});

cameraInstance.start();

if(
!outputStream
){

outputStream=
canvas.captureStream(
60
);

window.skeletonStream=
outputStream;
}
}


async function initTracker(){

await startCamera();

holistic=
new Holistic({

locateFile:f=>
`https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`
});

holistic.setOptions({

modelComplexity:1,
smoothLandmarks:true,
enableSegmentation:false
});

holistic.onResults(
r=>latestResults=r
);

document
.getElementById(
'dot-model'
)
.classList.add(
'active'
);

requestAnimationFrame(
renderLoop
);
}


document
.getElementById(
"cameraBtn"
).onclick=
async()=>{

const devices=
await navigator
.mediaDevices
.enumerateDevices();

const cams=
devices.filter(
d=>
d.kind==="videoinput"
);

const list=
cams.map(
(c,i)=>
`${i}: ${c.label}`
).join(
"\n"
);

const pick=
prompt(
"Choose camera:\n"+
list
);

if(
pick===null
)
return;

currentDeviceId=
cams[
Number(pick)
]?.deviceId;

await startCamera();
};


document
.getElementById(
'obsBtn'
).onclick=
()=>{

const obsWindow=
window.open(
window.location.href,
'_blank',
'width=1280,height=720'
);

if(
obsWindow
){

alert(
'In OBS:\n\nAdd Source → Browser Source\n\nPaste this URL:\n\n'+
obsWindow.location.href+
'\n\nSet width/height to 1920x1080'
);
}
};


document
.getElementById(
'toggleCam'
).onclick=
()=>{

showCamera=
!showCamera;

document
.getElementById(
'toggleCam'
).textContent=

showCamera
? 'HIDE CAM'
: 'SHOW CAM';
};


function renderLoop(){

requestAnimationFrame(
renderLoop
);


ctx.fillStyle='#000';
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);


if(
showCamera
){

ctx.save();

ctx.globalAlpha=
.25;

ctx.scale(
-1,
1
);

ctx.drawImage(
video,
-canvas.width,
0,
canvas.width,
canvas.height
);

ctx.restore();
}


if(
!latestResults
)
return;


const pose=
latestResults
.poseLandmarks;

if(
!pose
)
return;


const JOINTS=
pose.map(
(
lm,
i
)=>{

const raw={

x:
(1-lm.x)
*canvas.width,

y:
lm.y
*canvas.height
};

const smooth=
smoothPoint(
raw,
previousPose[i]
);

previousPose[i]=
smooth;

return smooth;
});


const shoulders={

x:
(
JOINTS[11].x+
JOINTS[12].x
)/2,

y:
(
JOINTS[11].y+
JOINTS[12].y
)/2
};


const hips={

x:
(
JOINTS[23].x+
JOINTS[24].x
)/2,

y:
(
JOINTS[23].y+
JOINTS[24].y
)/2
};


const neck={

x:
shoulders.x,

y:
shoulders.y-40
};


const extra={

neck,

spine:{

x:
(
neck.x+
hips.x
)/2,

y:
(
neck.y+
hips.y
)/2
},

hips
};


ctx.lineWidth=2;
ctx.strokeStyle='#00f5ff';
ctx.fillStyle='#00f5ff';


const FACE=
latestResults
.faceLandmarks;


if(
FACE
){

const facePts=
FACE.map(
lm=>({

x:
(1-lm.x)
*canvas.width,

y:
lm.y
*canvas.height
})
);

extra.chin=
facePts[152];

const OUTLINE=[
10,297,284,389,454,361,
397,379,400,152,176,
150,172,132,234,162,
54,67,10
];

const LEFT_EYE=
[33,133,159,145,33];

const RIGHT_EYE=
[362,263,386,374,362];

const NOSE=
[168,6,197,195,5,4];

const MOUTH=
[61,291,13,17];


for(
let i=0;
i<OUTLINE.length-1;
i++
){

ctx.beginPath();

ctx.moveTo(
facePts[
OUTLINE[i]
].x,

facePts[
OUTLINE[i]
].y
);

ctx.lineTo(
facePts[
OUTLINE[i+1]
].x,

facePts[
OUTLINE[i+1]
].y
);

ctx.stroke();
}


for(
let i=0;
i<NOSE.length-1;
i++
){

ctx.beginPath();

ctx.moveTo(
facePts[
NOSE[i]
].x,

facePts[
NOSE[i]
].y
);

ctx.lineTo(
facePts[
NOSE[i+1]
].x,

facePts[
NOSE[i+1]
].y
);

ctx.stroke();
}


for(
const i of
[
...LEFT_EYE,
...RIGHT_EYE,
...MOUTH
]
){

ctx.beginPath();

ctx.arc(
facePts[i].x,
facePts[i].y,
2.5,
0,
Math.PI*2
);

ctx.fill();
}
}


const BONES=[

['chin','neck'],

[11,12],

['neck','spine'],
['spine','hips'],

[11,13],
[13,15],

[12,14],
[14,16],

[23,25],
[25,27],
[27,31],

[24,26],
[26,28],
[28,32]
];


for(
const [a,b]
of BONES
){

const p1=
typeof a==="number"
? JOINTS[a]
: extra[a];

const p2=
typeof b==="number"
? JOINTS[b]
: extra[b];

if(
!p1||
!p2
)
continue;

ctx.beginPath();

ctx.moveTo(
p1.x,
p1.y
);

ctx.lineTo(
p2.x,
p2.y
);

ctx.stroke();
}


const HANDS=[

latestResults
.leftHandLandmarks,

latestResults
.rightHandLandmarks
];

const WRISTS=[
JOINTS[15],
JOINTS[16]
];

const HAND_CONN=[

[0,1],[1,2],[2,3],[3,4],
[0,5],[5,6],[6,7],[7,8],
[0,9],[9,10],[10,11],[11,12],
[0,13],[13,14],[14,15],[15,16],
[0,17],[17,18],[18,19],[19,20]
];


for(
let h=0;
h<HANDS.length;
h++
){

const hand=
HANDS[h];

if(
!hand
)
continue;


const wrist=
WRISTS[h];


const rawPts=
hand.map(
lm=>({

x:
(1-lm.x)
*canvas.width,

y:
lm.y
*canvas.height
})
);


const offsetX=
wrist.x-
rawPts[0].x;

const offsetY=
wrist.y-
rawPts[0].y;


const pts=
rawPts.map(
p=>({

x:
p.x+offsetX,

y:
p.y+offsetY
})
);


for(
const [a,b]
of HAND_CONN
){

ctx.beginPath();

ctx.moveTo(
pts[a].x,
pts[a].y
);

ctx.lineTo(
pts[b].x,
pts[b].y
);

ctx.stroke();
}


for(
const p of pts
){

ctx.beginPath();

ctx.arc(
p.x,
p.y,
2.5,
0,
Math.PI*2
);

ctx.fill();
}
}
}


initTracker();

</script>
</body>
</html>
