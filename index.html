<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKELETON TRACKER</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
if ('documentPictureInPicture' in window) {
  console.log('Document Picture-in-Picture supported');
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0
}

:root{
  --cyan:#00f5ff;
  --magenta:#ff00aa;
  --dim:#0a0a14
}

html,body{
  width:100%;
  height:100%;
  background:var(--dim);
  color:var(--cyan);
  font-family:'Share Tech Mono',monospace;
  overflow:hidden
}

#header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  padding:14px 28px;
  background:rgba(10,10,20,.8);
  z-index:50
}

#title{
  font-family:'Orbitron',sans-serif;
  font-weight:900;
  letter-spacing:.3em
}

#status-row{
  display:flex;
  gap:18px;
  font-size:.7rem
}

.status-badge{
  display:flex;
  align-items:center;
  gap:6px
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#333
}

.dot.active{
  background:var(--cyan)
}

.dot.detected{
  background:var(--magenta)
}

#canvas-wrapper{
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center
}

canvas{
  width:100%;
  height:100%;
  object-fit:contain;
  max-width:100vw;
  max-height:100vh;
}

video{
  display:none
}

#stats{
  position:fixed;
  bottom:20px;
  right:28px;
  font-size:.65rem;
  z-index:50
}

#overlay{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#0a0a14;
  z-index:100;
  gap:20px
}

#overlay.hidden{
  display:none
}

button{
  padding:14px 40px;
  border:none;
  background:var(--cyan);
  cursor:pointer;
  font-family:'Orbitron'
}

#pipBtn{
  position:fixed;
  bottom:20px;
  left:140px;
  z-index:100;
  padding:8px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="header">
<div id="title">◈ SKELETON TRACKER</div>

<div id="status-row">
<div class="status-badge">
<div class="dot" id="dot-cam"></div>
<span>CAMERA</span>
</div>

<div class="status-badge">
<div class="dot" id="dot-model"></div>
<span>MODEL</span>
</div>

<div class="status-badge">
<div class="dot" id="dot-detect"></div>
<span id="detect-label">NO SIGNAL</span>
</div>
</div>
</div>

<div id="canvas-wrapper">
<canvas id="output"></canvas>
</div>

<button id="toggleCam"
style="position:fixed;bottom:20px;left:20px;z-index:100;padding:8px 12px;cursor:pointer">
SHOW CAM
</button>

<button id="pipBtn">POP OUT</button>

<div id="stats">
FPS: <span id="fps-val">--</span><br>
JOINTS: <span id="joint-count">0</span><br>
HANDS: <span id="hand-count">0</span>
</div>

<div id="overlay">
<h1>SKELETON TRACKER</h1>
<button onclick="initTracker()">INITIALISE</button>
</div>

<video id="video"
playsinline
webkit-playsinline
autoplay
muted>
</video>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('output');
const ctx = canvas.getContext('2d');

const fpsEl = document.getElementById('fps-val');
const jointEl = document.getElementById('joint-count');
const handEl = document.getElementById('hand-count');
const detectEl = document.getElementById('detect-label');
const detectDot = document.getElementById('dot-detect');

let bgCanvas;
let latestResults = null;
let frameCount = 0;
let lastFpsClock = 0;
let lastUIUpdate = 0;
let lastInference = 0;
let showCamera = false;

let pipWindow = null;
let pipCanvas = null;
let pipCtx = null;

let outputStream = null;

let isMobile =
  /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

function createBackground(){

  bgCanvas = document.createElement('canvas');

  bgCanvas.width = canvas.width;
  bgCanvas.height = canvas.height;

  const bg = bgCanvas.getContext('2d');

  const step = 40;

  bg.strokeStyle = 'rgba(0,245,255,0.04)';

  bg.beginPath();

  for(let x=0;x<canvas.width;x+=step){
    bg.moveTo(x,0);
    bg.lineTo(x,canvas.height);
  }

  for(let y=0;y<canvas.height;y+=step){
    bg.moveTo(0,y);
    bg.lineTo(canvas.width,y);
  }

  bg.stroke();
}

async function initTracker(){

  const stream = await navigator.mediaDevices.getUserMedia({

    audio:false,

    video:{
      width:{ideal:isMobile ? 1280 : 960},
      height:{ideal:isMobile ? 720 : 540},

      facingMode:isMobile
        ? {ideal:'environment'}
        : 'user'
    }
  });

  video.srcObject = stream;

  video.setAttribute('playsinline', true);
  video.setAttribute('webkit-playsinline', true);
  video.muted = true;

  await video.play();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.style.aspectRatio =
    `${video.videoWidth} / ${video.videoHeight}`;

  createBackground();

  outputStream = canvas.captureStream(30);
  window.skeletonStream = outputStream;

  document.getElementById('dot-cam')
    .classList.add('active');

  const holistic = new Holistic({
    locateFile:f=>
      `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`
  });

  holistic.setOptions({
    modelComplexity:1,
    smoothLandmarks:true,
    enableSegmentation:false,
    refineFaceLandmarks:false
  });

  holistic.onResults(r=>latestResults=r);

  new Camera(video,{

    onFrame:async()=>{

      const now = performance.now();

      if(now-lastInference<33) return;

      lastInference = now;

      await holistic.send({image:video});
    },

    width:canvas.width,
    height:canvas.height

  }).start();

  document.getElementById('dot-model')
    .classList.add('active');

  document.getElementById('overlay')
    .classList.add('hidden');

  document.getElementById('toggleCam').onclick = ()=>{

    showCamera = !showCamera;

    document.getElementById('toggleCam').textContent =
      showCamera ? 'HIDE CAM' : 'SHOW CAM';
  };

  document.getElementById('pipBtn').onclick = async ()=>{

    if(!('documentPictureInPicture' in window)){

      alert('Picture-in-Picture not supported');

      return;
    }

    if(pipWindow){

      pipWindow.close();

      pipWindow = null;

      return;
    }

    pipWindow =
      await documentPictureInPicture.requestWindow({
        width:480,
        height:360
      });

    pipCanvas = document.createElement('canvas');

    pipCanvas.width = canvas.width;
    pipCanvas.height = canvas.height;

    pipCanvas.style.width = '100%';
    pipCanvas.style.height = '100%';

    pipCtx = pipCanvas.getContext('2d');

    pipWindow.document.body.style.margin = '0';

    pipWindow.document.body.appendChild(pipCanvas);

    pipWindow.addEventListener('pagehide', ()=>{

      pipWindow = null;
      pipCanvas = null;
      pipCtx = null;
    });
  };

  requestAnimationFrame(renderLoop);
}

function renderLoop(ts){

  requestAnimationFrame(renderLoop);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.drawImage(bgCanvas,0,0);

  if(showCamera){

    ctx.save();

    ctx.globalAlpha = 0.35;

    ctx.scale(-1,1);

    ctx.drawImage(
      video,
      -canvas.width,
      0,
      canvas.width,
      canvas.height
    );

    ctx.restore();
  }

  if(!latestResults) return;

  const pose = latestResults.poseLandmarks;

  if(!pose || pose.length < 25) return;

  const JOINTS = pose.map(lm => ({
    x:(1-lm.x)*canvas.width,
    y:lm.y*canvas.height
  }));

  const torsoTop = {
    x:(JOINTS[11].x + JOINTS[12].x)/2,
    y:(JOINTS[11].y + JOINTS[12].y)/2
  };

  const spineBase = {
    x:(JOINTS[23].x + JOINTS[24].x)/2,
    y:(JOINTS[23].y + JOINTS[24].y)/2
  };

  const neck = {
    x:torsoTop.x,
    y:torsoTop.y - 40
  };

  const extraPoints = {

    neck,

    spine:{
      x:(torsoTop.x + spineBase.x)/2,
      y:(torsoTop.y + spineBase.y)/2
    },

    spineBase
  };

  const BONES = [

    ['chin','neck'],

    ['neck','spine'],
    ['spine','spineBase'],

    [11,12],

    [11,13],
    [13,15],

    [12,14],
    [14,16],

    [23,24],

    [23,25],
    [25,27],
    [27,31],

    [24,26],
    [26,28],
    [28,32]
  ];

  const FACE = latestResults.faceLandmarks;

  if(FACE){

    const facePts = FACE.map(lm => ({
      x:(1-lm.x)*canvas.width,
      y:lm.y*canvas.height
    }));

    extraPoints.chin = facePts[152];

    const MOUTH =
      [61,291,13,17];

    for(const i of MOUTH){

      const p = facePts[i];

      ctx.beginPath();

      ctx.arc(p.x,p.y,2.3,0,Math.PI*2);

      ctx.fill();
    }
  }

  ctx.lineWidth = 2;
  ctx.strokeStyle = '#00f5ff';
  ctx.fillStyle = '#00f5ff';

  for(const [a,b] of BONES){

    const p1 =
      typeof a === 'number'
      ? JOINTS[a]
      : extraPoints[a];

    const p2 =
      typeof b === 'number'
      ? JOINTS[b]
      : extraPoints[b];

    if(!p1 || !p2) continue;

    ctx.beginPath();

    ctx.moveTo(p1.x,p1.y);

    ctx.lineTo(p2.x,p2.y);

    ctx.stroke();
  }

  if(pipCtx && pipCanvas){

    pipCtx.clearRect(
      0,
      0,
      pipCanvas.width,
      pipCanvas.height
    );

    pipCtx.drawImage(canvas,0,0);
  }
}

</script>
</body>
</html>
