<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>SKELETON TRACKER</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
if('documentPictureInPicture' in window){
  console.log('PiP supported');
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--cyan:#00f5ff;
--magenta:#ff00aa;
--dim:#0a0a14;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:var(--dim);
color:var(--cyan);
font-family:'Share Tech Mono';
}

#header{
position:fixed;
top:0;
left:0;
right:0;
z-index:50;
display:flex;
justify-content:space-between;
padding:14px 28px;
background:rgba(10,10,20,.8);
}

#title{
font-family:'Orbitron';
font-weight:900;
letter-spacing:.3em;
}

#status-row{
display:flex;
gap:18px;
font-size:.7rem;
}

.status-badge{
display:flex;
gap:6px;
align-items:center;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
background:#333;
}

.dot.active{
background:var(--cyan);
}

.dot.detected{
background:var(--magenta);
}

#canvas-wrapper{
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
object-fit:cover;
}

video{
display:none;
}

button{
border:none;
background:var(--cyan);
font-family:'Orbitron';
cursor:pointer;
padding:8px 12px;
z-index:100;
}

#overlay{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#0a0a14;
gap:20px;
z-index:100;
}

#overlay.hidden{
display:none;
}
</style>
</head>

<body>

<div id="header">

<div id="title">
◈ SKELETON TRACKER
</div>

<div id="status-row">

<div class="status-badge">
<div class="dot" id="dot-cam"></div>
CAM
</div>

<div class="status-badge">
<div class="dot" id="dot-model"></div>
MODEL
</div>

<div class="status-badge">
<div class="dot" id="dot-detect"></div>
<span id="detect-label">
NO SIGNAL
</span>
</div>

</div>
</div>

<div id="canvas-wrapper">
<canvas id="output"></canvas>
</div>

<button id="toggleCam"
style="position:fixed;bottom:20px;left:20px">
SHOW CAM
</button>

<button id="cameraPicker"
style="position:fixed;bottom:20px;left:130px">
CAM SOURCE
</button>

<button id="pipBtn"
style="position:fixed;bottom:20px;left:280px">
POP OUT
</button>

<div id="overlay">
<h1>SKELETON TRACKER</h1>
<button onclick="initTracker()">
INITIALISE
</button>
</div>

<video
id="video"
playsinline
webkit-playsinline
autoplay
muted>
</video>

<script>

const video=document.getElementById('video');
const canvas=document.getElementById('output');
const ctx=canvas.getContext('2d');

let bgCanvas;

let latestResults=null;

let showCamera=false;

let pipWindow=null;
let pipCanvas=null;
let pipCtx=null;

let outputStream=null;

let deviceId=null;

let cameraInstance;

const isMobile=
/Android|iPhone|iPad|iPod/i
.test(navigator.userAgent);

function createBackground(){

bgCanvas=document.createElement('canvas');

bgCanvas.width=canvas.width;
bgCanvas.height=canvas.height;

const bg=bgCanvas.getContext('2d');

bg.strokeStyle='rgba(0,245,255,0.04)';

for(let x=0;x<canvas.width;x+=40){

bg.beginPath();

bg.moveTo(x,0);
bg.lineTo(x,canvas.height);

bg.stroke();
}

for(let y=0;y<canvas.height;y+=40){

bg.beginPath();

bg.moveTo(0,y);
bg.lineTo(canvas.width,y);

bg.stroke();
}
}

async function startCamera(){

const constraints={

audio:false,

video:{

deviceId:
deviceId
? {exact:deviceId}
: undefined,

width:{ideal:1280},
height:{ideal:720},

facingMode:
isMobile
? 'user'
: undefined
}
};

const stream=
await navigator
.mediaDevices
.getUserMedia(constraints);

video.srcObject=stream;

await video.play();

canvas.width=
video.videoWidth;

canvas.height=
video.videoHeight;

canvas.style.aspectRatio=
`${video.videoWidth}/${video.videoHeight}`;

createBackground();

outputStream=
canvas.captureStream(30);

window.skeletonStream=
outputStream;

document
.getElementById('dot-cam')
.classList.add('active');

return stream;
}

async function initTracker(){

await startCamera();

const holistic=
new Holistic({

locateFile:f=>
`https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`
});

holistic.setOptions({

modelComplexity:1,
smoothLandmarks:true
});

holistic.onResults(
r=>latestResults=r
);

cameraInstance=
new Camera(video,{

onFrame:async()=>{

await holistic.send({
image:video
});
},

width:canvas.width,
height:canvas.height
});

cameraInstance.start();

document
.getElementById('dot-model')
.classList.add('active');

document
.getElementById('overlay')
.classList.add('hidden');

requestAnimationFrame(
renderLoop
);
}

document
.getElementById('cameraPicker')
.onclick=async()=>{

const devices=
await navigator
.mediaDevices
.enumerateDevices();

const cams=
devices.filter(
d=>d.kind==='videoinput'
);

const names=
cams.map(
(c,i)=>
`${i}: ${c.label}`
).join('\n');

const pick=
prompt(
`Choose camera:\n${names}`
);

if(pick===null)return;

deviceId=
cams[Number(pick)]
?.deviceId;

if(!deviceId)return;

video.srcObject
?.getTracks()
.forEach(
t=>t.stop()
);

await startCamera();
};

document
.getElementById('toggleCam')
.onclick=()=>{

showCamera=
!showCamera;

document
.getElementById('toggleCam')
.textContent=

showCamera
? 'HIDE CAM'
: 'SHOW CAM';
};

document
.getElementById('pipBtn')
.onclick=async()=>{

if(!('documentPictureInPicture'
in window)) return;

if(pipWindow){

pipWindow.close();

pipWindow=null;

return;
}

pipWindow=
await documentPictureInPicture
.requestWindow({

width:480,
height:360
});

pipCanvas=
document.createElement('canvas');

pipCanvas.width=
canvas.width;

pipCanvas.height=
canvas.height;

pipCtx=
pipCanvas.getContext('2d');

pipWindow.document.body
.style.margin='0';

pipWindow.document.body
.appendChild(
pipCanvas
);
};

function renderLoop(){

requestAnimationFrame(
renderLoop
);

ctx.clearRect(
0,0,
canvas.width,
canvas.height
);

ctx.drawImage(
bgCanvas,
0,0
);

if(showCamera){

ctx.save();

ctx.globalAlpha=.35;

ctx.scale(-1,1);

ctx.drawImage(
video,
-canvas.width,
0,
canvas.width,
canvas.height
);

ctx.restore();
}

if(!latestResults) return;

const pose=
latestResults.poseLandmarks;

if(!pose) return;

const JOINTS=
pose.map(
lm=>({

x:(1-lm.x)
*canvas.width,

y:lm.y
*canvas.height
})
);

const shoulder={

x:(JOINTS[11].x+
JOINTS[12].x)/2,

y:(JOINTS[11].y+
JOINTS[12].y)/2
};

const hips={

x:(JOINTS[23].x+
JOINTS[24].x)/2,

y:(JOINTS[23].y+
JOINTS[24].y)/2
};

const neck={

x:shoulder.x,
y:shoulder.y-40
};

const extra={

neck,

spine:{

x:(neck.x+
hips.x)/2,

y:(neck.y+
hips.y)/2
},

hips
};

const BONES=[

['chin','neck'],

['neck','spine'],
['spine','hips'],

[11,12],
[23,24],

[11,13],[13,15],
[12,14],[14,16],

[11,23],
[12,24],

[23,25],[25,27],[27,31],
[24,26],[26,28],[28,32]
];

const FACE=
latestResults.faceLandmarks;

if(FACE){

const pts=
FACE.map(
lm=>({

x:(1-lm.x)
*canvas.width,

y:lm.y
*canvas.height
})
);

extra.chin=
pts[152];

const LEFT_EYE=
[33,133,159,145,33];

const RIGHT_EYE=
[362,263,386,374,362];

const MOUTH=
[61,291,13,17];

for(const i of
[...LEFT_EYE,
...RIGHT_EYE,
...MOUTH]){

ctx.beginPath();

ctx.arc(
pts[i].x,
pts[i].y,
2.5,
0,
Math.PI*2
);

ctx.fill();
}
}

ctx.strokeStyle=
'#00f5ff';

ctx.fillStyle=
'#00f5ff';

for(const [a,b]
of BONES){

const p1=
typeof a==='number'
? JOINTS[a]
: extra[a];

const p2=
typeof b==='number'
? JOINTS[b]
: extra[b];

if(!p1||!p2)
continue;

ctx.beginPath();

ctx.moveTo(
p1.x,p1.y
);

ctx.lineTo(
p2.x,p2.y
);

ctx.stroke();
}

const HANDS=[

latestResults
.leftHandLandmarks,

latestResults
.rightHandLandmarks
];

const HAND_CONN=[

[0,1],[1,2],[2,3],[3,4],

[0,5],[5,6],[6,7],[7,8],

[0,9],[9,10],[10,11],[11,12],

[0,13],[13,14],[14,15],[15,16],

[0,17],[17,18],[18,19],[19,20]
];

for(const hand
of HANDS){

if(!hand)
continue;

const pts=
hand.map(
lm=>({

x:(1-lm.x)
*canvas.width,

y:lm.y
*canvas.height
})
);

for(const [a,b]
of HAND_CONN){

ctx.beginPath();

ctx.moveTo(
pts[a].x,
pts[a].y
);

ctx.lineTo(
pts[b].x,
pts[b].y
);

ctx.stroke();
}

for(const p of pts){

ctx.beginPath();

ctx.arc(
p.x,
p.y,
2.2,
0,
Math.PI*2
);

ctx.fill();
}
}

if(pipCtx){

pipCtx.clearRect(
0,0,
pipCanvas.width,
pipCanvas.height
);

pipCtx.drawImage(
canvas,
0,0
);
}
}

</script>
</body>
</html>
